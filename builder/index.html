<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airborne — Scenario Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="toolbar">
    <div class="toolbar-left">
      <span class="app-title">Airborne</span>
      <span class="app-subtitle">Scenario Builder</span>
      <div class="toolbar-separator"></div>
      <button id="btn-new" class="btn toolbar-btn" title="New scenario">New</button>
      <button id="btn-import" class="btn toolbar-btn" title="Import JSON">Import</button>
      <input type="file" id="input-import-file" accept=".json,.jsonc" hidden>
      <div class="toolbar-separator"></div>
      <button id="btn-page-map" class="btn toolbar-btn tab-active" title="Map editor">Map</button>
      <button id="btn-page-weapons" class="btn toolbar-btn" title="Weapon types">Weapons</button>
      <button id="btn-page-objectives" class="btn toolbar-btn" title="Objectives manager">Objectives</button>
      <button id="btn-page-settings" class="btn toolbar-btn" title="Settings">⚙ Settings</button>
      <div class="toolbar-separator"></div>
      <button id="btn-toggle-grayscale" class="btn toolbar-btn tab-active" title="Toggle map grayscale">Grayscale</button>
      <button id="btn-grid-toggle" class="btn toolbar-btn" title="Toggle grid overlay">Grid</button>
      <div class="toolbar-separator"></div>
      <button id="btn-zoom-in" class="btn toolbar-btn" title="Zoom in">+</button>
      <button id="btn-zoom-out" class="btn toolbar-btn" title="Zoom out">−</button>
      <div class="toolbar-separator"></div>
      <button id="btn-undo" class="btn toolbar-btn" title="Undo (Ctrl+Z)" disabled>↩ Undo</button>
      <button id="btn-redo" class="btn toolbar-btn" title="Redo (Ctrl+Y)" disabled>↪ Redo</button>
    </div>
    <div class="toolbar-right">
      <button id="btn-save" class="btn toolbar-btn" title="Save to file">Save</button>
      <button id="btn-load" class="btn toolbar-btn" title="Load from file">Load</button>
      <input type="file" id="input-load-file" accept=".json,.jsonc" hidden>
      <button id="btn-validate" class="btn toolbar-btn" title="Validate scenario">Validate</button>
      <button id="btn-export" class="btn toolbar-btn btn-primary" title="Export JSON">Export</button>
    </div>
  </header>

  <main id="app">
    <aside id="sidebar"></aside>
    <div id="canvas-container">
      <canvas id="map-canvas"></canvas>
    </div>
    <aside id="inspector"></aside>
  </main>

  <!-- Weapons page (hidden by default) -->
  <div id="weapons-page" style="display:none"></div>

  <!-- Objectives page (hidden by default) -->
  <div id="objectives-page" style="display:none"></div>

  <!-- Settings page (hidden by default) -->
  <div id="settings-page" style="display:none"></div>

  <!-- Validation results dialog -->
  <div id="validation-dialog" class="dialog-overlay">
    <div class="dialog">
      <div class="dialog-header">
        <h3>Validation Results</h3>
        <button class="dialog-close">×</button>
      </div>
      <div class="dialog-content"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
