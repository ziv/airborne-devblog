baseURL: "https://ziv.github.io/airborne/"
locale: "en-us"
title: "Airborne"
theme: "re-terminal"

defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false
disableDefaultLanguageRedirect: false

services:
  googleAnalytics:
    id: "G-0GMMREP8RD"

params:
  themeColor: "pink"
  contentTypeName: "posts"
#  showLanguageSelector: true
  twitter:
    creator: "zivdev"

markup:
  goldmark:
    renderer:
      unsafe: true

author:
  name: "Ziv Perry"
  email: "ziv.perry@gmail.com"

languages:
  en:
    direction: "ltr"
    contentDir: "content"
    disabled: false
    languageName: "English"
    locale: "en-us"
    weight: 1
    params:
      languageName: "English"
      title: "AIRBORNE"
      subtitle: "Development blog"
      logo:
        logoText: "AIRBORNE"
        logoHomeLink: "/airborne/"
    menu:
      main:
        - identifier: "about"
          name: "About"
          url: "/about"
        - identifier: "repo"
          name: "Repository"
          url: "https://github.com/ziv/airborne"

  he:
    weight: 2
    contentDir: "content/he"
    direction: "rtl"
    disabled: false
    label: "עברית"
    locale: "he-il"
    title: "איירבורן"
    params:
      languageName: "English"
      title: "AIRBORNE"
      subtitle: "Development blog"
      logo:
        logoText: "AIRBORNE"
        logoHomeLink: "/airborne/he"
    menu:
      main:
        - identifier: "repo"
          name: "ריפו"
          url: "https://github.com/ziv/airborne"
        - identifier: "about"
          name: "אודות"
          url: "/he/about"
